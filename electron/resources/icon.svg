<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient - dark greens -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3028"/>
      <stop offset="50%" style="stop-color:#0d1a14"/>
      <stop offset="100%" style="stop-color:#0a1410"/>
    </linearGradient>

    <!-- Balloon gradient - accent greens -->
    <linearGradient id="balloonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc"/>
      <stop offset="40%" style="stop-color:#4a9"/>
      <stop offset="100%" style="stop-color:#3a8070"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>

  <!-- Subtle grid lines like the splash -->
  <g stroke="#1a3028" stroke-width="1" opacity="0.5">
    <line x1="200" y1="750" x2="824" y2="750"/>
    <line x1="150" y1="800" x2="874" y2="800"/>
    <line x1="100" y1="850" x2="924" y2="850"/>
  </g>

  <!-- Hot air balloon - simplified -->
  <g filter="url(#glow)">
    <!-- Balloon envelope -->
    <ellipse cx="512" cy="380" rx="200" ry="240" fill="url(#balloonGradient)" opacity="0.9"/>

    <!-- Balloon stripes/segments -->
    <path d="M512 140 Q420 300 420 450 Q420 520 512 620 Q604 520 604 450 Q604 300 512 140"
          fill="none" stroke="#0d1a14" stroke-width="3" opacity="0.3"/>
    <path d="M362 350 Q440 280 512 280 Q584 280 662 350"
          fill="none" stroke="#0d1a14" stroke-width="2" opacity="0.2"/>
    <path d="M342 420 Q430 360 512 360 Q594 360 682 420"
          fill="none" stroke="#0d1a14" stroke-width="2" opacity="0.2"/>

    <!-- Ropes -->
    <line x1="400" y1="580" x2="440" y2="700" stroke="#4a9" stroke-width="4"/>
    <line x1="624" y1="580" x2="584" y2="700" stroke="#4a9" stroke-width="4"/>
    <line x1="512" y1="620" x2="512" y2="700" stroke="#4a9" stroke-width="4"/>

    <!-- Basket -->
    <rect x="400" y="700" width="224" height="120" rx="12" fill="none" stroke="#4a9" stroke-width="3"/>
    <!-- Basket weave lines -->
    <line x1="400" y1="740" x2="624" y2="740" stroke="#4a9" stroke-width="2" opacity="0.4"/>
    <line x1="400" y1="780" x2="624" y2="780" stroke="#4a9" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Cowboy hat in the basket -->
  <g transform="translate(462, 720) scale(0.4)">
    <path d="M216,120a8,8,0,0,0-6.78,3.76A179.9,179.9,0,0,1,195.41,143L178.32,53.07a16,16,0,0,0-25.72-9.55l-.13.1L128,64,103.53,43.62l-.13-.1a16,16,0,0,0-25.72,9.53L60.59,143a179.27,179.27,0,0,1-13.81-19.25A8,8,0,0,0,40,120a40,40,0,0,0,0,80H216a40,40,0,0,0,0-80ZM93.41,56,117.88,76.4l.12.1a15.92,15.92,0,0,0,20,0l.12-.1L162.59,56l13.68,72H79.73ZM40,184a24,24,0,0,1-4.14-47.64C51.28,159.83,67.73,174.65,82.4,184Zm88,0c-.33,0-25.49-.4-53.86-26.6L76.68,144H179.31l2.54,13.35a113.28,113.28,0,0,1-27.35,19C139.1,183.77,128.06,184,128,184Zm88,0H173.6c14.67-9.35,31.12-24.17,46.54-47.64A24,24,0,0,1,216,184Z"
          fill="#4a9"/>
  </g>
</svg>
