  # ==========================================================================
  # Lightweight/Quick Prompts
  # ==========================================================================

  quick_answer:
    name: "Quick Answer"
    description: "Fast responses for simple queries, definitions, and brief explanations"
    keywords:
      - what is
      - define
      - quick
      - simple
      - brief
      - short
      - meaning
      - definition
    min_tier: QUICK
    preferred_tier: QUICK
    max_tier: QUICK
    template: |
      You are Hester, a helpful AI assistant. Answer concisely in 1-2 sentences.
      Be direct and avoid unnecessary preamble.

      If you need more context to answer properly, ask a clarifying question.

  # ==========================================================================
  # Meta-Prompts (for low-confidence routing fallback)
  # These are selected via FunctionGemma when semantic routing is uncertain
  # ==========================================================================

  multi_domain_exploration:
    name: "Cross-Domain Investigation"
    description: "Exploring questions that span multiple parts of the system - code, database, docs, infrastructure"
    keywords: []  # Selected by FunctionGemma, not semantic routing
    min_tier: STANDARD
    preferred_tier: DEEP
    max_tier: REASONING
    template_file: prompts/multi_domain_exploration.md
    meta_prompt: true  # Flag for FunctionGemma selection

  implementation_planning:
    name: "Implementation Architect"
    description: "Planning implementations that touch multiple services, require task decomposition, or have complex dependencies"
    keywords: []  # Selected by FunctionGemma, not semantic routing
    min_tier: STANDARD
    preferred_tier: DEEP
    max_tier: REASONING
    template_file: prompts/implementation_planning.md
    meta_prompt: true  # Flag for FunctionGemma selection

  novel_concept:
    name: "Concept Explorer"
    description: "Exploring new concepts, researching unfamiliar technologies, or evaluating approaches not yet in the codebase"
    keywords: []  # Selected by FunctionGemma, not semantic routing
    min_tier: STANDARD
    preferred_tier: DEEP
    max_tier: REASONING
    template_file: prompts/novel_concept.md
    meta_prompt: true  # Flag for FunctionGemma selection

  # ==========================================================================
  # Fallback Prompt
  # ==========================================================================

  general:
    name: "General Assistant"
    description: "Fallback for unmatched requests - versatile problem-solving across all domains"
    keywords: []  # Empty keywords = fallback
    min_tier: QUICK
    preferred_tier: STANDARD
    max_tier: DEEP
    template_file: prompts/general.md


# ==========================================================================
# Routing Configuration
# ==========================================================================

routing:
  # Minimum similarity score (0-1) to select a prompt
  # Scores below this trigger meta-prompt classification
  match_threshold: 0.45

  # Fallback prompt when no match and meta-classification fails
  fallback: general

  # Meta-prompts for FunctionGemma classification when below threshold
  meta_prompts:
    - multi_domain_exploration
    - implementation_planning
    - novel_concept

  # Whether to log routing decisions
  log_routing: true
